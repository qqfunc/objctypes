pre-commit:
  parallel: true
  jobs:
    - name: Check
      group:
        parallel: true
        jobs:
          - name: editorconfig-checker
            run: uv run ec
          - name: Typos
            run: uv run typos
          - name: Ruff
            group:
              parallel: true
              jobs:
                - name: Check
                  run: uv run ruff check
                - name: Format
                  run: uv run ruff format --check
          - name: ty
            run: uv run ty check
          - name: Clang Format
            run: clang-format --Werror -n ./csrc/*
          - name: sphinx-lint
            run: uv run task docs-lint
          - name: pytest
            run: uv run pytest
          - name: uv lock
            run: uv lock --check

commit-msg:
  jobs:
    - name: Committed
      run: uv run committed --commit-file ./.git/COMMIT_EDITMSG

check:
  parallel: true
  jobs:
    - name: editorconfig-checker
      run: uv run ec
    - name: Typos
      run: uv run typos
    - name: Ruff
      group:
        parallel: true
        jobs:
          - name: Check
            run: uv run ruff check
          - name: Format
            run: uv run ruff format --check
    - name: ty
      run: uv run ty check
    - name: Clang Format
      run: clang-format --Werror -n ./csrc/*
    - name: sphinx-lint
      run: uv run task docs-lint
    - name: pytest
      run: uv run pytest
    - name: uv lock
      run: uv lock --check

fix:
  jobs:
    - name: Check
      group:
        parallel: true
        jobs:
          - name: editorconfig-checker
            run: uv run ec
          - name: ty
            run: uv run ty check
          - name: sphinx-lint
            run: uv run task docs-lint
          - name: pytest
            run: uv run pytest
    - name: Fix
      group:
        jobs:
          - name: Typos
            run: uv run typos -w
          - name: Ruff
            group:
              jobs:
                - name: Ruff Check
                  run: uv run ruff check --fix
                - name: Ruff Format
                  run: uv run ruff format
          - name: Clang Format
            run: clang-format --Werror -i ./csrc/*
          - name: uv lock
            run: uv lock
